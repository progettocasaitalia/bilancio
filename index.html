<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProgettoCasaItalia | Dashboard Spaziale</title>
    <style>
        :root {
            --primary: #00b894;
            --dark-overlay: rgba(0, 0, 0, 0.6);
        }

        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            margin: 0; 
            padding: 0;
            color: #fff;
            /* SFONDO ITALIA DALLO SPAZIO */
            background: linear-gradient(var(--dark-overlay), var(--dark-overlay)), 
                        url('https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?ixlib=rb-1.2.1&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
        }

        /* HEADER CON LOGO A SINISTRA E MENU A DESTRA */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 50px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .logo { 
            font-size: 1.6em; 
            font-weight: 900; 
            letter-spacing: -1px; 
            color: #fff;
            text-decoration: none;
        }
        .logo span { color: var(--primary); }

        /* MENU A CASCATA (DROPDOWN) */
        nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
        }

        .dropdown {
            position: relative;
            margin-left: 30px;
        }

        .dropdown > a {
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9em;
            text-transform: uppercase;
            padding: 10px 0;
            display: block;
            transition: 0.3s;
        }

        .dropdown:hover > a { color: var(--primary); }

        .dropdown-menu {
            display: none;
            position: absolute;
            top: 100%;
            right: 0;
            background: rgba(255, 255, 255, 0.95);
            min-width: 200px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            border-radius: 8px;
            padding: 10px 0;
            z-index: 100;
        }

        .dropdown:hover .dropdown-menu {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        .dropdown-menu a {
            color: #333;
            padding: 12px 20px;
            text-decoration: none;
            display: block;
            font-size: 0.85em;
            font-weight: 500;
        }

        .dropdown-menu a:hover {
            background: var(--primary);
            color: #fff;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* CONTENITORE CENTRALE */
        .main-content {
            max-width: 900px;
            margin: 60px auto;
            background: rgba(255, 255, 255, 0.1); /* Sfondo semi-trasparente */
            backdrop-filter: blur(15px);
            padding: 50px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.2);
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        h1 { font-size: 3em; margin-bottom: 10px; letter-spacing: -2px; }
        .sub { font-size: 1.2em; color: #ccc; margin-bottom: 50px; }

        /* TORTA 3D VOLUMETRICA (PERFEZIONATA) */
        .canvas-3d {
            perspective: 1200px;
            width: 320px;
            height: 320px;
            margin: 0 auto 60px auto;
        }

        .pie-object {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transform: rotateX(55deg) rotateZ(-25deg);
            transition: transform 0.8s cubic-bezier(0.2, 1, 0.2, 1);
        }

        .pie-object:hover { transform: rotateX(45deg) rotateZ(0deg); }

        .layer {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(
                #ff7675 0% 35%, #00b894 35% 49%, #74b9ff 49% 57%, 
                #a29bfe 57% 65%, #fab1a0 65% 69%, #dfe6e9 69% 100%
            );
        }

        /* Creazione spessore volumetrico */
        .l1 { transform: translateZ(0px); opacity: 0.3; }
        .l2 { transform: translateZ(4px); filter: brightness(0.7); }
        .l3 { transform: translateZ(8px); filter: brightness(0.8); }
        .l4 { transform: translateZ(12px); filter: brightness(0.9); }

        .top-face {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            transform: translateZ(16px);
            background: conic-gradient(
                #ff7675 0% 35%, #00b894 35% 49%, #74b9ff 49% 57%, 
                #a29bfe 57% 65%, #fab1a0 65% 69%, #dfe6e9 69% 100%
            );
            border: 1px solid rgba(255,255,255,0.4);
            box-shadow: inset 0 0 30px rgba(255,255,255,0.2);
        }

        /* LEGENDA SPAZIALE */
        .legend-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
        }

        .legend-item {
            background: rgba(0, 0, 0, 0.4);
            padding: 15px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .dot { width: 12px; height: 12px; border-radius: 3px; margin-right: 12px; }

        footer {
            margin-top: 50px;
            padding: 40px;
            background: rgba(0,0,0,0.9);
            text-align: center;
            font-size: 0.8em;
            color: #888;
        }
    </style>
