        /* Contenitore Bianco */
        .box { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; max-width: 800px; }
        
        h1 { color: #2d3436; margin-bottom: 5px; }
        p { color: #636e72; margin-bottom: 40px; }

        /* LA TORTA 3D */
        .scena {
            perspective: 1000px;
            width: 300px;
            height: 300px;
            margin: 0 auto 50px auto;
        }

        .torta {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transform: rotateX(45deg) rotateZ(-15deg);
            transition: 0.5s;
        }

        .torta:hover { transform: rotateX(35deg) rotateZ(0deg); }
